<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ديوان الشعر الشعبي العراقي</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f4f9; text-align: center; padding: 50px; }
        h1 { color: #2c3e50; }
        .poem { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        p { font-size: 1.5rem; line-height: 2; color: #333; }
    </style>
</head>
<body>

    <h1>أهلاً بكم في ديوان الشعر الشعبي</h1>
    <div class="poem">
        <p>
            يا ريحة هلي .. يا ديرة الطيبين<br>
            بكلبي شوككم .. ما غاب لحظة سنين<br>
            عراقي الروح .. والوجدان ينبض بيك<br>
            يا أعز الناس .. يا أغلى المحبين
        </p>
    </div>

</body>
</html>
